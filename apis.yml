apis:
  - aid: legora:legora-aos
    name: Legora aOS
    description: >-
      Legora aOS is the company's agentic operating system for legal
      work, connecting information, communication, and execution across
      Agent, Monitors, Lists, Legal Research, Tabular Review, Workflows,
      and the client Portal. Legora does not currently publish a public,
      self-serve developer API; integrations with document management
      systems, productivity tools, and firm workflows are delivered
      through enterprise engagements and partner arrangements. This
      entry documents the Legora product surface for discoverability;
      specific endpoints and base URLs are gated behind customer
      agreements.
    humanURL: https://legora.com/product
    baseURL: https://legora.com
    tags:
      - LegalTech
      - Agentic AI
      - Collaborative AI
      - Enterprise
      - Word Add-In
      - Outlook Add-In
    properties:
      - type: Documentation
        url: https://legora.com/product
      - type: SignUp
        url: https://legora.com/book-a-demo
      - type: Pricing
        url: https://legora.com/book-a-demo
      - type: TrustCenter
        url: https://security.legora.com/
      - type: CaseStudy
        url: https://www.microsoft.com/en/customers/story/23171-legora-azure-openai
    features:
      - name: Agent
        description: >-
          Plans, executes, reviews, and delivers complex legal work
          end-to-end as an agentic capability.
      - name: Monitors
        description: >-
          Continuously scans global regulations and surfaces relevant
          changes to legal teams.
      - name: Lists
        description: >-
          Organizes legal work and connects AI outputs into structured
          workflows (announced as coming soon).
      - name: Legal Research
        description: >-
          Performs agentic legal research across jurisdictions.
      - name: Tabular Review
        description: >-
          Large-scale document analysis with parallel prompts, tagging,
          and collaborative review.
      - name: Workflows
        description: >-
          Automates complex multi-step legal workflows.
      - name: Portal
        description: >-
          Client-facing delivery and collaboration interface.
      - name: Word Add-In
        description: >-
          Brings Legora drafting and review directly into Microsoft Word.
      - name: Outlook Add-In
        description: >-
          Brings Legora into Microsoft Outlook for legal email workflows.
      - name: Editor
        description: >-
          Native editing surface for legal drafting inside Legora.
      - name: Mobile App
        description: >-
          Mobile access to Legora for on-the-go legal work.
    useCases:
      - name: Mergers And Acquisitions
        description: >-
          Support transactional lawyers across diligence, drafting, and
          deal execution.
      - name: Litigation
        description: >-
          Analyze case materials, surface authorities, and draft briefs
          and submissions.
      - name: Banking And Finance
        description: >-
          Support banking lawyers on financing documents and regulatory
          analysis.
      - name: Tax
        description: >-
          Research tax positions and analyze tax-related documents.
      - name: Insurance
        description: >-
          Review policies and analyze insurance contract portfolios.
      - name: Law Firm Productivity
        description: >-
          Equip associates and partners with collaborative AI across
          practice groups.
      - name: In-House Legal Operations
        description: >-
          Streamline contract analysis, research, and policy work for
          corporate legal teams.
    integrations:
      - name: Microsoft Word
      - name: Microsoft Outlook
      - name: Microsoft 365
      - name: Azure OpenAI Service
      - name: Elastic
    authentication:
      - type: Enterprise SSO
        description: >-
          Access is controlled via enterprise SSO and customer-specific
          provisioning; no public API key program is published.
