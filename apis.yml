aid: legora
name: Legora
description: >-
  Legora is a Stockholm- and London-based legal AI company (formerly Leya)
  building a collaborative AI workspace for lawyers. The platform is
  centered on Legora aOS, an agentic operating system that connects
  information, communication, and the execution of legal work across
  Agent, Monitors, Lists, Legal Research, Tabular Review, Workflows, and
  the client-facing Portal, with Word and Outlook add-ins, an Editor, and
  a mobile app. Legora is sold to elite law firms and in-house legal
  teams via enterprise contracts; customers include Mannheimer Swartling,
  Goodwin Procter, Cleary Gottlieb, Linklaters, Bird & Bird, and HWL
  Ebsworth, with 400+ firms across 40+ countries. There is no public,
  self-serve developer API, SDK, or open-source release; integrations are
  arranged through enterprise sales and partnership engagements, and the
  platform runs on Azure OpenAI Service with SOC 2 Type II, ISO 27001,
  ISO 42001, GDPR, and HIPAA controls.
